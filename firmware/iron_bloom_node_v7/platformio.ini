; ============================================================
;  IRON BLOOM NODE v7 -- Oura Ring 4 BLE Sovereign Bridge
;  PlatformIO project config
;  Date: 2026-06-29
;  Target: ESP32 (WROOM-32 or ESP32-S3); NimBLE Central + MQTT
; ============================================================
;
;  Build:    pio run
;  Upload:   pio run -t upload
;  Monitor:  pio device monitor -b 115200
;  Clean:    pio run -t clean
;
;  REQUIRED: copy secrets.h.template to secrets.h, populate the
;            16-byte ORING_AUTH_KEY (see oura_authkey_extraction_RECIPE.md),
;            populate ORING_MAC, WIFI_SSID, WIFI_PASS.
;            secrets.h is gitignored. NEVER commit it.
; ============================================================

[platformio]
default_envs = esp32dev
; Use the project root as the source dir so PIO sees iron_bloom_v7.ino,
; oura_ble.cpp, oura_decoder.cpp, mqtt_publish.cpp at the top level
; AND can still see src/main.cpp (excluded via build_src_filter below).
src_dir = .

[env:esp32dev]
platform        = espressif32@^6.7.0
board           = esp32dev
framework       = arduino
monitor_speed   = 115200
upload_speed    = 921600
board_build.partitions = huge_app.csv
build_src_filter =
    +<*.ino>
    +<*.cpp>
    -<src/>
    -<.pio/>
    -<archive/>
build_flags =
    -I.
    -DCORE_DEBUG_LEVEL=3
    -DCONFIG_BT_NIMBLE_MAX_CONNECTIONS=2
    -DCONFIG_BT_NIMBLE_ROLE_CENTRAL=1
    -DCONFIG_BT_NIMBLE_ROLE_OBSERVER=1
    -DCONFIG_BT_NIMBLE_ROLE_PERIPHERAL=0
    -DCONFIG_BT_NIMBLE_ROLE_BROADCASTER=0
    -DCONFIG_BT_NIMBLE_MAX_CCCDS=20
    -DARDUINOJSON_USE_LONG_LONG=1
lib_deps =
    h2zero/NimBLE-Arduino @ ^1.4.1
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^7.0.4

; ---- Optional: ESP32-S3 variant for richer BLE stack + extra RAM ----
[env:esp32-s3]
platform        = espressif32@^6.7.0
board           = esp32-s3-devkitc-1
framework       = arduino
monitor_speed   = 115200
upload_speed    = 921600
board_build.partitions = huge_app.csv
build_src_filter =
    +<*.ino>
    +<*.cpp>
    -<src/>
    -<.pio/>
    -<archive/>
build_flags =
    -I.
    -DCORE_DEBUG_LEVEL=3
    -DCONFIG_BT_NIMBLE_MAX_CONNECTIONS=2
    -DCONFIG_BT_NIMBLE_ROLE_CENTRAL=1
    -DCONFIG_BT_NIMBLE_ROLE_OBSERVER=1
    -DCONFIG_BT_NIMBLE_MAX_CCCDS=20
    -DARDUINOJSON_USE_LONG_LONG=1
    -DBOARD_VARIANT_S3=1
lib_deps =
    h2zero/NimBLE-Arduino @ ^1.4.1
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^7.0.4
